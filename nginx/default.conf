map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

map $request_uri $mediafetch_loggable {
    default 1;
    ~^/api/v1/files/ 0;
}

# Re-resolve Compose service names after containers are replaced. Without a
# runtime resolver, a long-lived Nginx container keeps the removed container IP.
resolver 127.0.0.11 valid=10s ipv6=off;
resolver_timeout 5s;

upstream mediafetch_api {
    zone mediafetch_api 64k;
    server api:8000 resolve;
    keepalive 32;
}

upstream mediafetch_frontend {
    zone mediafetch_frontend 64k;
    server frontend:3000 resolve;
    keepalive 16;
}

server {
    listen 80;
    server_name _;
    server_tokens off;
    # Allows a 128 KiB cookie file plus multipart framing; FastAPI enforces the
    # exact 128 KiB limit and all other request models remain strictly bounded.
    client_max_body_size 160k;
    access_log /var/log/nginx/access.log combined if=$mediafetch_loggable;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ^~ /api/v1/jobs/ {
        proxy_pass http://mediafetch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3700s;
        proxy_send_timeout 3700s;
        add_header X-Accel-Buffering no always;
    }

    location /api/ {
        proxy_pass http://mediafetch_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_request_buffering off;
        proxy_read_timeout 120s;
    }

    # This path can only be reached through a validated X-Accel-Redirect
    # response from FastAPI. Direct client requests receive 404.
    location ^~ /protected/ {
        internal;
        alias /data/downloads/;
        sendfile on;
        sendfile_max_chunk 2m;
        tcp_nopush on;
        max_ranges 8;
        add_header Accept-Ranges bytes always;
    }

    location / {
        proxy_pass http://mediafetch_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 120s;
    }
}
