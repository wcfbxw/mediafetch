server {
    listen 80;
    listen [::]:80;
    server_name mnzo.de www.mnzo.de mediafetch.152.53.50.97.nip.io;
    server_tokens off;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mediafetch-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://mnzo.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mediafetch.152.53.50.97.nip.io;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/mediafetch.152.53.50.97.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediafetch.152.53.50.97.nip.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://mnzo.de$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.mnzo.de;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/mnzo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mnzo.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/mediafetch-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://mnzo.de$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mnzo.de;
    server_tokens off;
    client_max_body_size 32k;

    ssl_certificate /etc/letsencrypt/live/mnzo.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mnzo.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256";
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:MediaFetchSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location ^~ /api/v1/files/ {
        access_log off;
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 32 256k;
        proxy_busy_buffers_size 2m;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 3700s;
        proxy_send_timeout 3700s;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        proxy_read_timeout 3700s;
        proxy_send_timeout 3700s;
    }
}
